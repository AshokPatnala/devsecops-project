name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        run: docker build -t devsecops-app:latest .

      - name: Run Container Security Scan (Trivy)
        run: |
          docker run --rm aquasec/trivy image devsecops-app:latest || true